<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zaklar</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<h1>ZAKLAR</h1>

<p>Visual Novels Archive</p>

<input 
type="text" 
id="search"
placeholder="Search games..."
>

</header>


<section class="categories">

<h2>Categories</h2>

<div class="category-grid">

<div class="category">PS Vita</div>
<div class="category">PSP</div>
<div class="category">PC Games</div>
<div class="category">Nintendo DS</div>

<!-- ✅ FIXED: now clickable -->
<a href="switch.html" class="category">Nintendo Switch</a>

<div class="category">3DS</div>
<div class="category">English Patches</div>

</div>

</section>


<section class="games">

<h2>Latest Games</h2>

<div class="game-grid">

<!-- ✅ UPDATED GAME -->
<div class="game-card" data-name="Virche Evermore Error Salvation">
  <img src="https://static.wikia.nocookie.net/english-otome-games/images/8/83/Shuuen_no_Virche.jpg/revision/latest?cb=20220703055122">
  <h3>Virche Evermore - Error Salvation</h3>
  <p>Nintendo Switch</p>
</div>

</div> 

</section>
    
<!-- Discord Bottom Banner -->
<div id="discord-banner" class="discord-bottom-bar">
  <div class="discord-content">

    <img src="https://i.imgur.com/reBcdqJ.png" 
         alt="Discord" 
         class="discord-logo">

    <div class="discord-text">
      <strong>Join our Discord community</strong>

      <div class="discord-sub">
        emulation tutorials, support and multilingual chat
      </div>
    </div>

    <a href="https://discord.gg/fAYxcb79xT" 
       target="_blank" 
       class="discord-join-btn">
      Join
    </a>

    <button onclick="closeDiscordBanner()" class="discord-close-btn">✕</button>
  </div>
</div>

<script>
function closeDiscordBanner() {
  document.getElementById('discord-banner').style.display = 'none';
}
</script>

<script src="script.js"></script>

</body>
</html>
