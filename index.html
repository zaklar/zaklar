<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zaklar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>ZAKLAR</h1>

<p>Visual Novels archive</p>

<input 
type="text" 
id="search"
placeholder="Search games..."
>

</header>


<section class="categories">

<h2>Categories</h2>

<div class="category-grid">

<div class="category">PS Vita</div>
<div class="category">PSP</div>
<div class="category">PC Games</div>
<div class="category">Nintendo DS</div>
<div class="category">Nintendo Switch</div>
<div class="category">3DS</div>
<div class="category">English Patches</div>

</div>

</section>


<section class="games">

<h2>Latest Games</h2>

<div class="game-grid">

<div class="game-card">
<img src="assets/game-covers/example.jpg">
<h3>Game Name</h3>
<p>PS Vita</p>
</div>

</div> 

</section>


<div class="discord-bar">

    <div class="bar-content">
        <img src="assets/discord.png" class="discord-icon">
        <span>Join our Discord server</span>
        <a href="https://discord.gg/Wh6jYPsWf" target="_blank">Join</a>
    </div>


    <img src="https://ami.animecharactersdatabase.com/uploads/chars/82407-1531599195.png" class="bar-character">

</div>


<script src="script.js"></script>

</body>
</html>
