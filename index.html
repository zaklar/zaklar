<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zaklar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>ZAKLAR</h1>

<p>Visual Novels Archive</p>

<input 
type="text" 
id="search"
placeholder="Search games..."
>

</header>


<section class="categories">

<h2>Categories</h2>

<div class="category-grid">

<div class="category">PS Vita</div>
<div class="category">PSP</div>
<div class="category">PC Games</div>
<div class="category">Nintendo DS</div>
<div class="category">Nintendo Switch</div>
<div class="category">3DS</div>
<div class="category">English Patches</div>

</div>

</section>


<section class="games">

<h2>Latest Games</h2>

<div class="game-grid">

<div class="game-card">
<img src="assets/game-covers/example.jpg">
<h3>Game Name</h3>
<p>PS Vita</p>
</div>

</div> 

</section>
    
<!-- Discord Bottom Banner -->
<div id="discord-banner" class="discord-bottom-bar">
  <div class="discord-content">
    <!-- Discord Logo -->
    <img src="https://i.imgur.com/reBcdqJ.png" 
         alt="Discord" 
         class="discord-logo">

    <div class="discord-text">
      <strong>Join our Discord community</strong><br>
     <div class="discord-sub">
  emulation tutorials, support and multilingual chat
</div>
    </div>

    <a href="https://discord.gg/fAYxcb79xT" 
       target="_blank" 
       class="discord-join-btn">
      Join
    </a>

    <button onclick="closeDiscordBanner()" class="discord-close-btn">✕</button>
  </div>
</div>

<style>
.discord-bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #2c2c2c;           
  color: #ffffff;
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.25);
  border-top: 3px solid #ff8ec8; 
    }

.discord-content {
  display: flex;
  align-items: center;
  gap: 16px;
  max-width: 1200px;
  width: 100%;
}

.discord-logo {
  width: 36px;
  height: 36px;
}

.discord-text {
  flex: 1;
  font-size: 15.5px;
  line-height: 1.4;
  color: #f0f0f0;
}

.discord-join-btn {
  background: #ff69b4;           
  color: white;
  padding: 10px 26px;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 600;
  font-size: 15px;
  transition: all 0.2s;
  box-shadow: 0 3px 8px rgba(255, 105, 180, 0.3);
}

.discord-join-btn:hover {
  background: #ff4da6;
  transform: translateY(-2px);
}

.discord-close-btn {
  background: none;
  border: none;
  color: #ddd;
  font-size: 23px;
  cursor: pointer;
  padding: 0 10px;
}

.discord-close-btn:hover {
  color: #fff;
}

/* Mobile */
@media (max-width: 768px) {
  .discord-content {
    flex-wrap: wrap;
    justify-content: center;
    text-align: center;
    gap: 12px;
  }
}
</style>

<script>
function closeDiscordBanner() {
  document.getElementById('discord-banner').style.display = 'none';
}
</script>

</script>
</div>


<script src="script.js"></script>

</body>
</html>
