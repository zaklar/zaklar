<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Switch Games - Zaklar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="switch-header">

    <div class="switch-title">

        <img 
            class="switch-logo"
            src="https://img.icons8.com/ios_filled/512/F25081/nintendo-switch-logo.png"
            alt="Nintendo Switch Logo"
        >

        <h1>
            SWITCH <span class="heart">♡</span>
        </h1>

    </div>

    <p class="switch-subtitle">
        Nintendo Switch Games
    </p>

    <input 
        class="search-bar"
        type="text"
        id="search"
        placeholder="Search games..."
    >

</header>


<section class="games">

    <h2>Switch Games</h2>

    <div class="game-grid" id="gameList">

        <div class="game-card">

            <img 
                src="https://static.wikia.nocookie.net/english-otome-games/images/8/83/Shuuen_no_Virche.jpg/revision/latest?cb=20220703055122"
                alt="Virche Evermore Error Salvation"
            >

            <h3>
                Virche Evermore - Error Salvation
            </h3>

            <p>
                Switch
            </p>

        </div>

    </div>

</section>


<script>

const searchInput = document.getElementById("search");
const games = document.querySelectorAll(".game-card");

searchInput.addEventListener("input", () => {

    const searchValue = searchInput.value.toLowerCase();

    games.forEach(game => {

        const title = game.querySelector("h3")
            .textContent
            .toLowerCase();

        game.style.display = title.includes(searchValue)
            ? ""
            : "none";

    });

});

</script>

</body>
</html>
