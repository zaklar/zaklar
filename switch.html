<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Switch Games - Zaklar</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- HEADER -->
<header class="switch-header">

  <div class="switch-title">
    <img src="https://p7.hiclipart.com/preview/124/387/587/nintendo-switch-framed-video-game-logo-nintendo-thumbnail.jpg" class="switch-logo">
    <h1>SWITCH <span class="heart">♡</span></h1>
  </div>

  <p>Nintendo Switch Games</p>

  <input 
    type="text" 
    id="search"
    placeholder="Search games..."
  >

</header>


<!-- GAMES SECTION -->
<section class="games">

  <h2>Switch Games</h2>

  <div class="game-grid" id="gameList">

    <!-- GAME 1 -->
    <div class="game-card">
      <img src="https://static.wikia.nocookie.net/english-otome-games/images/8/83/Shuuen_no_Virche.jpg/revision/latest?cb=20220703055122">
      <h3>Virche Evermore - Error Salvation</h3>
      <p>Switch</p>
    </div>

  </div>

</section>


<!-- SEARCH SCRIPT -->
<script>
const searchInput = document.getElementById("search");
const games = document.querySelectorAll(".game-card");

searchInput.addEventListener("keyup", function () {
  const value = this.value.toLowerCase();

  games.forEach(game => {
    const title = game.querySelector("h3").textContent.toLowerCase();

    if (title.includes(value)) {
      game.style.display = "block";
    } else {
      game.style.display = "none";
    }
  });
});
</script>

</body>
</html>
